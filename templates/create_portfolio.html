{% extends "base.html" %}

{% block title %}Create Portfolio - InvestIQ{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="mb-8 text-center">
        <h1 class="text-4xl font-bold bg-gradient-to-r from-blue-600 to-indigo-600 bg-clip-text text-transparent mb-2">
            Create New Portfolio</h1>
        <p class="text-gray-600">Start organizing your investments by creating a specialized portfolio.</p>
    </div>

    <div class="bg-blue-50 rounded-xl card-shadow p-8 border-2 border-blue-100 shadow-sm">
        <form action="{{ url_for('dashboard.create_portfolio') }}" method="POST" class="space-y-6">
            <div>
                <label for="name" class="block text-sm font-semibold text-gray-700 mb-2">Portfolio Name *</label>
                <input type="text" id="name" name="name" required
                    class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-smooth"
                    placeholder="e.g., Retirement Fund, Tech Stocks, Long Term Holdings">
            </div>

            <div>
                <label for="description" class="block text-sm font-semibold text-gray-700 mb-2">Description
                    (Optional)</label>
                <textarea id="description" name="description" rows="3"
                    class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-smooth"
                    placeholder="Briefly describe the purpose of this portfolio..."></textarea>
            </div>

            <div>
                <label for="initial_investment" class="block text-sm font-semibold text-gray-700 mb-2">Initial
                    Investment (INR)</label>
                <div class="relative">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-500">₹</span>
                    <input type="number" id="initial_investment" name="initial_investment" step="0.01" min="0" value="0"
                        class="w-full pl-10 pr-4 py-3 border-2 border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-smooth"
                        placeholder="0.00">
                </div>
                <p class="mt-2 text-xs text-gray-500">You can update this later as you add more holdings.</p>
            </div>

            <div class="pt-4 flex items-center gap-4">
                <button type="submit" class="btn-primary py-3 px-8 text-lg font-semibold flex-1">
                    Create Portfolio
                </button>
                <a href="{{ url_for('dashboard.portfolio') }}" class="btn-secondary py-3 px-8 text-lg font-semibold">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
